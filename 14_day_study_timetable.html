function renderDays(){
  const container = document.getElementById('days-container');
  let weekHtml = '';

  DAYS.forEach((d, di) => {
    if(di === 0) weekHtml += `<div class="week-header">Week 1 — Theory deep-read (Days 1–7)</div>`;
    if(di === 7) weekHtml += `<div class="week-header">Week 2 — Active coding (Days 8–14)</div>`;

    const savedChecks = JSON.parse(localStorage.getItem(`day${d.day}`) || '[]');

    const tasksHtml = d.tasks.map((t, ti) => {
      const checked = savedChecks.includes(ti);
      return `<div class="task">
        <div class="task-cb ${checked ? 'checked':''}" onclick="toggleTask(${d.day},${ti})" role="checkbox" aria-checked="${checked}" aria-label="${t}"></div>
        <span class="task-text ${checked ? 'done-text':''}" id="task-text-${d.day}-${ti}">${t}</span>
      </div>`;
    }).join('');

    const sessionsHtml = d.sessions.map(s =>
      `<div class="session-row">
        <span class="session-time">${s.time}</span>
        <span class="session-task">${s.task}</span>
      </div>`
    ).join('');

    weekHtml += `
      <div class="day-card" id="day-card-${d.day}">
        <div class="day-header">
          <div class="day-num upcoming" id="daynum-${d.day}">${d.day}</div>
          <div class="day-title">
            <div class="label">${d.label}</div>
            <div class="sublabel">${d.sublabel}</div>
          </div>
          <span class="phase-badge ${d.phase}" style="margin-right:6px">${d.phase==='phase-read'?'Reading':d.phase==='phase-code'?'Coding':d.phase==='phase-both'?'Read + Code':d.phase==='phase-sql'?'SQL':'Rest'}</span>
          <span class="hours-badge">${d.hours}</span>
        </div>
        <div class="session-block">${sessionsHtml}</div>
        <div style="margin-top:10px;" class="tasks">${tasksHtml}</div>
        <div class="daily-rule">${d.rule}</div>
      </div>`;
  });

  container.innerHTML = weekHtml;
  updateProgress();
}

function toggleTask(day, taskIdx){
  let saved = JSON.parse(localStorage.getItem(`day${day}`) || '[]');
  if(saved.includes(taskIdx)){
    saved = saved.filter(i => i !== taskIdx);
  } else {
    saved.push(taskIdx);
  }
  localStorage.setItem(`day${day}`, JSON.stringify(saved));

  const cb = document.querySelector(`#day-card-${day} .task:nth-child(${taskIdx+1}) .task-cb`);
  const txt = document.getElementById(`task-text-${day}-${taskIdx}`);
  if(cb){ cb.classList.toggle('checked', saved.includes(taskIdx)); cb.setAttribute('aria-checked', saved.includes(taskIdx)); }
  if(txt){ txt.classList.toggle('done-text', saved.includes(taskIdx)); }

  updateProgress();
  updateDayNum(day);
}

function updateDayNum(day){
  const d = DAYS.find(x => x.day === day);
  if(!d) return;
  const saved = JSON.parse(localStorage.getItem(`day${day}`) || '[]');
  const el = document.getElementById(`daynum-${day}`);
  if(!el) return;
  if(saved.length === d.tasks.length){
    el.className = 'day-num done';
  } else if(saved.length > 0){
    el.className = 'day-num today';
  } else {
    el.className = 'day-num upcoming';
  }
}

function updateProgress(){
  let total = 0, done = 0;
  DAYS.forEach(d => {
    total += d.tasks.length;
    const saved = JSON.parse(localStorage.getItem(`day${d.day}`) || '[]');
    done += saved.length;
  });
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `${done} / ${total} tasks done  (${pct}%)`;
  DAYS.forEach(d => updateDayNum(d.day));
}

renderDays();
</script>
